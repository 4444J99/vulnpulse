name = "vulnpulse"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
binding = "ASSETS"

[ai]
binding = "AI"

# Cron once daily at 12:00 UTC. Was every-6h, but each cycle re-put the full
# 24h-rolling-window of CVEs to KV (≈250 CVEs × 4 cycles = ~1000 puts/day),
# exhausting the Workers KV free-tier 1k put/day limit. With daily cadence
# plus get-before-put (see runCron), each CVE is written at most once per day.
[triggers]
crons = ["0 12 * * *"]

[[kv_namespaces]]
binding = "VP_CVES"
id = "efcfc20caadd4b8b9f54c14140a926a1"

[[kv_namespaces]]
binding = "VP_DIGEST"
id = "2dddf2f7887145d7819dc4a789c3ce59"

[[kv_namespaces]]
binding = "VP_SUBS"
id = "9077c2dbbea2465fb30324d0d02332a7"

[vars]
USER_AGENT = "Mozilla/5.0 (compatible; VulnPulse/0.1; +https://vulnpulse.ivixivi.workers.dev)"

[observability]
enabled = true
